
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient (Deep Purple to Bright Cyan) -->
    <linearGradient id="bgGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6F11D0" />
      <stop offset="100%" stop-color="#00D2FF" />
    </linearGradient>

    <!-- Soft Drop Shadow for the White Elements -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background App Icon Shape (Rounded Square) -->
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bgGradient)" />

  <!-- Main Logo Elements Group with Shadow -->
  <g filter="url(#softShadow)">
    
    <!-- The Continuous Smooth Blob Path -->
    <path d="M 256 70
             A 65 65 0 0 1 310 160
             A 50 50 0 0 0 352 202
             A 65 65 0 0 1 442 256
             A 65 65 0 0 1 352 310
             A 50 50 0 0 0 310 352
             A 65 65 0 0 1 256 442
             A 65 65 0 0 1 202 352
             A 50 50 0 0 0 160 310
             A 65 65 0 0 1 70 256
             A 65 65 0 0 1 160 202
             A 50 50 0 0 0 202 160
             A 65 65 0 0 1 256 70 Z" 
          fill="#FFFFFF" />

    <!-- The 4 Detached Outer Circles -->
    <circle cx="150" cy="150" r="38" fill="#FFFFFF" />
    <circle cx="362" cy="150" r="38" fill="#FFFFFF" />
    <circle cx="150" cy="362" r="38" fill="#FFFFFF" />
    <circle cx="362" cy="362" r="38" fill="#FFFFFF" />

  </g>

  <!-- The Inner Cutout (Gradient Circle) -->
  <circle cx="256" cy="256" r="95" fill="url(#bgGradient)" />

  <!-- The Central "O" (White Outline) -->
  <circle cx="256" cy="256" r="42" fill="none" stroke="#FFFFFF" stroke-width="26" />

</svg>
